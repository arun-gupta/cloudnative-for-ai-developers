apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: dist-training
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
            - name: pytorch
              image: dist-training:latest
              imagePullPolicy: Never
              # The Training Operator injects MASTER_ADDR, MASTER_PORT, RANK,
              # and WORLD_SIZE automatically. train.py reads them at startup.
    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
            - name: pytorch
              image: dist-training:latest
              imagePullPolicy: Never
              # No WORKER_STARTUP_DELAY here. The operator creates all pods
              # together and the worker connects once it's ready — no race.
